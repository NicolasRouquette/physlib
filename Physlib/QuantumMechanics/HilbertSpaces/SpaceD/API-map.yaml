version: v0.1

Title: Hilbert spaces on Space

Overview: |
  The Hilbert space on Space with measure μ is the $L^2$ space consisting of μ-a.e. equal
  equivalence classes of complex functions which are square-integrable with respect to μ.
  These Hilbert spaces are used extensively in non-relativistic quantum mechanics.

ParentAPIs:
  - Space (Physlib/SpaceAndTime/Space)

